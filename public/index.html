<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#c9f8e7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>听瓜</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <!-- 顶部栏 -->
      <header class="topbar" aria-label="应用状态">
        <div class="brand">
          <span class="brand-text">听瓜</span>
          <span class="brand-comma">，</span>
        </div>
        <span id="aiBadge" class="status-pill">
          <svg class="pill-star" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
          </svg>
          本地评分
        </span>
      </header>

      <!-- 装饰层：漂浮元素 -->
      <div class="decorations" aria-hidden="true">
        <!-- 右上角西瓜片 -->
        <div class="deco deco-slice slice-top">
          <svg viewBox="0 0 120 120">
            <defs>
              <linearGradient id="fleshGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ff8a9a" />
                <stop offset="100%" stop-color="#ff5c70" />
              </linearGradient>
            </defs>
            <path d="M60 10 A50 50 0 0 1 110 60 L60 60 Z" fill="url(#fleshGrad)" />
            <path d="M60 10 A50 50 0 0 1 110 60 L60 60 Z" fill="none" stroke="#4caf50" stroke-width="8" />
            <path d="M60 10 A50 50 0 0 1 110 60 L60 60 Z" fill="none" stroke="#e8f5e9" stroke-width="3" transform="scale(0.92) translate(5,5)" />
            <ellipse cx="82" cy="38" rx="3" ry="5" fill="#3e2723" transform="rotate(25 82 38)" />
            <ellipse cx="95" cy="52" rx="3" ry="5" fill="#3e2723" transform="rotate(55 95 52)" />
          </svg>
        </div>

        <!-- 左下角西瓜块 -->
        <div class="deco deco-cube cube-left">
          <svg viewBox="0 0 80 80">
            <rect x="12" y="28" width="52" height="52" rx="10" fill="#ff7a8a" />
            <rect x="12" y="28" width="52" height="52" rx="10" fill="none" stroke="#4caf50" stroke-width="6" />
            <circle cx="32" cy="50" r="2.5" fill="#3e2723" />
            <circle cx="50" cy="58" r="2.5" fill="#3e2723" />
            <circle cx="42" cy="42" r="2.5" fill="#3e2723" />
            <path d="M18 22 L30 8 L70 8 L58 22 Z" fill="#81c784" opacity="0.7" />
            <path d="M58 22 L70 8 L70 48 L58 62 Z" fill="#66bb6a" opacity="0.6" />
          </svg>
        </div>

        <!-- 右下角西瓜块 -->
        <div class="deco deco-cube cube-right">
          <svg viewBox="0 0 80 80">
            <rect x="16" y="30" width="48" height="48" rx="10" fill="#ff7a8a" />
            <rect x="16" y="30" width="48" height="48" rx="10" fill="none" stroke="#4caf50" stroke-width="6" />
            <circle cx="34" cy="50" r="2.5" fill="#3e2723" />
            <circle cx="50" cy="44" r="2.5" fill="#3e2723" />
            <path d="M22 24 L34 10 L70 10 L58 24 Z" fill="#81c784" opacity="0.7" />
          </svg>
        </div>

        <!-- 漂浮叶子 -->
        <div class="deco deco-leaf leaf-1">
          <svg viewBox="0 0 40 40">
            <path d="M20 2 C35 8 38 25 20 38 C2 25 5 8 20 2 Z" fill="#81c784" />
            <path d="M20 2 Q20 20 20 38" stroke="#4caf50" stroke-width="1.5" fill="none" />
          </svg>
        </div>
        <div class="deco deco-leaf leaf-2">
          <svg viewBox="0 0 36 36">
            <path d="M18 2 C32 8 34 24 18 34 C2 24 4 8 18 2 Z" fill="#a5d6a7" />
          </svg>
        </div>

        <!-- 气泡 -->
        <div class="deco deco-bubble bubble-1"></div>
        <div class="deco deco-bubble bubble-2"></div>
        <div class="deco deco-bubble bubble-3"></div>
        <div class="deco deco-bubble bubble-4"></div>
        <div class="deco deco-bubble bubble-5"></div>
      </div>

      <!-- 西瓜主视觉区 -->
      <section class="melon-stage" aria-label="西瓜声学检测">
        <p class="tap-hint">
          <span class="hint-line hint-line-left"></span>
          轻敲西瓜开始检测
          <span class="hint-line hint-line-right"></span>
        </p>

        <div class="melon-frame">
          <span class="ripple-ring ring-one"></span>
          <span class="ripple-ring ring-two"></span>
          <span class="ripple-ring ring-three"></span>
          <div class="melon-glow"></div>
          <img id="melonImage" src="/assets/watermelon.png?v=2" alt="西瓜" />
          <!-- SVG 西瓜切片装饰 -->
        </div>
      </section>

      <!-- 声波动画 -->
      <div class="wave-bar" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>

      <!-- 实时波形画布（录音时显示） -->
      <canvas id="waveCanvas" width="320" height="72" aria-hidden="true"></canvas>

      <!-- 文案区 -->
      <section class="copy-block">
        <h1>敲一下，听听甜度</h1>
        <p class="subtitle">轻敲西瓜，系统会根据声音判断甜度</p>
        <p class="mic-note">
          <svg class="mic-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 14.5a3.2 3.2 0 0 0 3.2-3.2V6.2a3.2 3.2 0 1 0-6.4 0v5.1a3.2 3.2 0 0 0 3.2 3.2Z" />
            <path d="M6.4 11.1a5.6 5.6 0 0 0 11.2 0M12 16.8V21M9 21h6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          需要麦克风权限才能录音
        </p>
      </section>

      <!-- 主按钮 -->
      <section class="actions" aria-live="polite">
        <button id="recordButton" class="record-button" type="button" aria-label="开始检测">
          <span class="btn-shadow"></span>
          <span class="btn-content">
            <svg class="btn-mic" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 14.5a3.2 3.2 0 0 0 3.2-3.2V6.2a3.2 3.2 0 1 0-6.4 0v5.1a3.2 3.2 0 0 0 3.2 3.2Z" />
              <path d="M6.4 11.1a5.6 5.6 0 0 0 11.2 0M12 16.8V21M9 21h6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span id="recordLabel">开始检测</span>
          </span>
        </button>
      </section>

      <!-- 底部信息卡 -->
      <section id="infoCard" class="info-card">
        <div class="info-icon">
          <svg viewBox="0 0 48 48" aria-hidden="true">
            <rect x="8" y="20" width="4" height="16" rx="2" fill="#66bb6a" />
            <rect x="16" y="14" width="4" height="22" rx="2" fill="#66bb6a" />
            <rect x="24" y="18" width="4" height="18" rx="2" fill="#66bb6a" />
            <rect x="32" y="10" width="4" height="26" rx="2" fill="#66bb6a" />
            <rect x="40" y="22" width="4" height="14" rx="2" fill="#66bb6a" />
          </svg>
        </div>
        <div class="info-copy">
          <h2>轻敲后自动分析</h2>
          <p>识别声音频率，评估西瓜甜度</p>
        </div>
        <div class="sweetness-meter">
          <span class="meter-label">甜度指数</span>
          <div class="meter-score">
            <span id="scoreValue">--</span>
            <span class="meter-total">/ 100</span>
          </div>
          <div class="meter-bars">
            <span></span><span></span><span></span>
          </div>
        </div>
      </section>

      <!-- 结果面板 -->
      <section id="resultPanel" class="result-panel" hidden>
        <div class="result-head">
          <div>
            <p id="resultLabel" class="result-label">等待检测</p>
            <h2 id="resultTagline">准备听瓜</h2>
          </div>
        </div>
        <p id="resultSummary" class="result-summary">录音后会显示声学评分。</p>

        <div class="metric-grid" aria-label="音频特征">
          <div class="metric-card">
            <span>主频</span>
            <strong id="frequencyValue">-- Hz</strong>
          </div>
          <div class="metric-card">
            <span>回响</span>
            <strong id="decayValue">-- s</strong>
          </div>
          <div class="metric-card">
            <span>高频</span>
            <strong id="highValue">--%</strong>
          </div>
        </div>

        <ul id="reasonList" class="reason-list"></ul>
        <p id="aiNotice" class="ai-notice"></p>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
